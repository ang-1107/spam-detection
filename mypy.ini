[mypy]
python_version = 3.11
explicit_package_bases = True

# Third-party packages without py.typed / stubs in a typical local env
[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-nltk.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-kaggle.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True
